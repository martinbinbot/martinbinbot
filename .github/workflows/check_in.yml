name: Daily CheckIn

# 允许手动点击运行，也设置了每天凌晨运行
on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'

jobs:
  check-in:
    runs-on: ubuntu-latest
    steps:
      # 1. 下载代码
      - uses: actions/checkout@v3

      # 2. 安装 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. 直接运行签到逻辑
      # 注意：这里我把脚本直接写进去了，不需要额外的 .js 文件
      - name: Run CheckIn Script
        env:
          # 这里引用你在 Settings -> Secrets 里设置的变量
          COOKIE: ${{ secrets.COOKIE }}
        run: |
          node -e "
          const axios = require('axios');

          // 获取环境变量中的 Cookie
          const cookie = process.env.COOKIE;

          if (!cookie) {
            console.error('错误：未找到 COOKIE 环境变量！');
            process.exit(1);
          }

          console.log('正在尝试签到...');

          // 这里模拟一个签到请求（你需要根据实际的签到接口修改 URL 和参数）
          // 注意：GitHub Actions 环境默认包含 axios，如果报错需用 npm install axios
          axios.post('你的签到接口地址', {}, {
            headers: {
              'Cookie': cookie,
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36',
              'Content-Type': 'application/json'
            }
          })
          .then(response => {
            console.log('签到响应:', response.data);
            // 根据返回结果判断是否成功
            if (response.data && response.data.code === 0) { // 假设 code 0 代表成功
               console.log('签到成功！');
            } else {
               console.log('签到可能已执行或接口返回异常');
            }
          })
          .catch(error => {
            console.error('签到请求失败:', error.message);
            process.exit(1);
          });
          "
